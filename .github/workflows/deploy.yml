name: Deploy to Production

# Esto le dice a GitHub que solo ejecute este proceso
# cuando haya un 'push' o un 'merge' hacia la rama main.
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Conectar por SSH y actualizar contenedores
        uses: appleboy/ssh-action@v1.0.3
        with:
          # Las credenciales se toman de los secretos de GitHub
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22 # Puerto SSH estándar, cámbialo si usas otro
          
          # Estos son los comandos que se ejecutarán en tu servidor
          script: |
            # Entramos a la carpeta del proyecto
            cd ${{ secrets.PROJECT_PATH }}
            
            # Traemos los últimos cambios de main
            git pull origin main
            
            # Bajamos los contenedores actuales
            docker compose down
            
            # Limpiamos contenedores viejos y cosas colgadas
            # (-a limpia imágenes sin usar, -f fuerza sin preguntar, --volumes limpia volúmenes huérfanos)
            docker system prune -af --volumes
            
            # Levantamos todo de nuevo reconstruyendo
            docker compose up --build -d
